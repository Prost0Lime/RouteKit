name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build signed APK and module zip
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Gradle
        shell: bash
        run: |
          set -euo pipefail
          GRADLE_VERSION="8.7"
          curl -fsSL "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/gradle-${GRADLE_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Prepare release signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${ANDROID_KEYSTORE_BASE64}" || -z "${ANDROID_KEYSTORE_PASSWORD}" || -z "${ANDROID_KEY_ALIAS}" || -z "${ANDROID_KEY_PASSWORD}" ]]; then
            echo "::error::Missing Android signing secrets. Add ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS and ANDROID_KEY_PASSWORD."
            exit 1
          fi
          keystore_path="$RUNNER_TEMP/routekit-release.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$keystore_path"
          echo "ROUTEKIT_KEYSTORE_PATH=$keystore_path" >> "$GITHUB_ENV"
          echo "ROUTEKIT_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "ROUTEKIT_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "ROUTEKIT_KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Build release APK
        run: gradle :app:assembleRelease --no-daemon

      - name: Package module zip
        run: sh tools/package-module.sh

      - name: Prepare artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          cp app/build/outputs/apk/release/app-release.apk release-artifacts/RouteKit-app-release.apk
          cp dist/*.zip release-artifacts/
          ls -la release-artifacts

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: routekit-artifacts
          path: release-artifacts/*

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release-artifacts/* --clobber
          else
            gh release create "$tag" release-artifacts/* \
              --title "RouteKit ${tag}" \
              --notes-file CHANGELOG.md
          fi
